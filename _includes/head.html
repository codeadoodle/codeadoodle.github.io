<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>{% if page.title and page.url != "/"%}{{ page.title }} &#8211; {% endif %}{{ site.title }}: {{ site.description }}</title>
    <meta name="description" content="{% if page.summary %}{{ page.summary }}{% else %}{{ site.meta_description }}{% endif %}"/>
    <meta name="author" content="{{ site.author }}">
    {% if page.categories %}<meta name="keywords" content="{{ page.categories | join: ', ' }}">{% endif %}
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

    <meta name="HandheldFriendly" content="True" />
    <meta name="MobileOptimized" content="320" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" type="text/css" href="//fonts.googleapis.com/css?family=Merriweather:300,700,700italic,300italic|Open+Sans:700,400" />
    <!-- Customisation  -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/milligram/1.1.0/milligram.min.css">
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | prepend: site.baseurl }}">
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Open Graph -->
    <!-- From: https://github.com/mmistakes/hpstr-jekyll-theme/blob/master/_includes/head.html -->
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="article">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:site_name" content="{{ site.title }}">

    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="57x57" href="{{ "/assets/images/apple-touch-icon-57x57.png"| prepend: site.baseurl }}">
    <link rel="apple-touch-icon" sizes="114x114" href="{{ "/assets/images/apple-touch-icon-114x114.png"| prepend: site.baseurl }}">
    <link rel="apple-touch-icon" sizes="72x72" href="{{ "/assets/images/apple-touch-icon-72x72.png"| prepend: site.baseurl }}">
    <link rel="apple-touch-icon" sizes="144x144" href="{{ "/assets/images/apple-touch-icon-144x144.png"| prepend: site.baseurl }}">
    <link rel="apple-touch-icon" sizes="60x60" href="{{ "/assets/images/apple-touch-icon-60x60.png"| prepend: site.baseurl }}">
    <link rel="apple-touch-icon" sizes="120x120" href="{{ "/assets/images/apple-touch-icon-120x120.png"| prepend: site.baseurl }}">
    <link rel="apple-touch-icon" sizes="76x76" href="{{ "/assets/images/apple-touch-icon-76x76.png"| prepend: site.baseurl }}">
    <link rel="apple-touch-icon" sizes="152x152" href="{{ "/assets/images/apple-touch-icon-152x152.png"| prepend: site.baseurl }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ "/assets/images/apple-touch-icon-180x180.png"| prepend: site.baseurl }}">
    <link rel="icon" type="image/png" href="{{ "/assets/images/favicon-192x192.png"| prepend: site.baseurl }}" sizes="192x192">
    <link rel="icon" type="image/png" href="{{ "/assets/images/favicon-160x160.png"| prepend: site.baseurl }}" sizes="160x160">
    <link rel="icon" type="image/png" href="{{ "/assets/images/favicon-96x96.png"| prepend: site.baseurl }}" sizes="96x96">
    <link rel="icon" type="image/png" href="{{ "/assets/images/favicon-16x16.png"| prepend: site.baseurl }}" sizes="16x16">
    <link rel="icon" type="image/png" href="{{ "/assets/images/favicon-32x32.png"| prepend: site.baseurl }}" sizes="32x32">
</head>
