---
layout: default
post_class: post-template page-template
---
<header class="main-header  post-head {% if page.cover %}" style="background-image: url({{ page.cover }}) {%else%}no-cover{% endif %}">

<nav class="main-nav clearfix">
    <a class="back-button icon-arrow-left-back" href="{{ site.baseurl }}"><i class="fa fa-home"></i> {{ site.name }}</a>
    <a class="subscribe-button icon-feed" href="{{ site.baseurl }}rss.xml">Subscribe</a>
</nav>
</header>

<main class="content" role="main">
    <article class="post">
     {% include header-compact.html %}
       <!--  <header class="post-header">
            <a id="blog-logo" href="{{site.baseurl}}">
                {% if site.logo %}
                    <img src="{{site.logo}}" alt="{{ site.name }}" />
                {% else %}
                    <span class="blog-title">{{ site.name }}</span>
                {%endif%} 
            </a>
        </header> -->

        <h1 class="post-title">{{ page.title }}</h1>

        <section class="post-content">
            {{content}}
        </section>
  <footer class="post-footer">
            <!-- If we want to display author's name and bio -->
            {% include author.html %}

            <!-- Share links section -->
            {% include share.html %}
            
            <!-- Disqus comments -->
            {% if page.disqus %}
                {% include disqus.html %}
            {% endif %}
            
        </footer>
    </article>

</main>
